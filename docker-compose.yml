# ────────────────────────────────────────────────────────────────────────────
# SphereHealth / BIMS — per-hospital stack (Option A: one isolated deploy each)
#
# Every hospital gets its OWN copy of this stack: its own frontend + backend
# containers, its own MongoDB, and its own named volumes. Run it per hospital
# with a distinct project name + env file (the deploy/provision-hospital.sh
# script does this for you):
#
#   docker compose --env-file deploy/apollo.env -p apollo up -d --build
#
# Isolation: a separate compose project + separate volumes means apollo's data,
# uploads and DB can never touch city-hospital's. See deploy/DEPLOY.md.
# ────────────────────────────────────────────────────────────────────────────
name: ${HOSPITAL_SLUG:-hospital}

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    # Intentionally NOT published to the host — only `backend` reaches it over
    # the internal network. (To use MongoDB Atlas / an external DB instead,
    # delete this service + the depends_on below and set MONGO_URI yourself.)
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "5050"
      # Per-hospital DB lives inside this hospital's own mongo container.
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${HOSPITAL_SLUG}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      # Same-origin via the nginx proxy; also list the public URL for safety.
      CORS_ORIGINS: ${PUBLIC_URL}
      HOSPITAL_TZ: ${HOSPITAL_TZ:-Asia/Kolkata}
      # D2 — in-container nightly backup (index.js cron → scripts/backup/*,
      # tool-free EJSON, no mongodump). Write verified archives onto the
      # persistent backend-backups volume so they survive container recreate.
      BACKUP_OFFLINE_DIR: /app/backups
      # Off-site copy is MANDATORY unless this opt-out is set. Fresh installs
      # default to OFFLINE-ONLY so the nightly backup SUCCEEDS out of the box;
      # for real disaster recovery, mount an off-site path into the container,
      # set BACKUP_SYNCED_DIR to it, and set BACKUP_ALLOW_OFFLINE_ONLY=0
      # (see deploy/DEPLOY.md → Backups).
      BACKUP_ALLOW_OFFLINE_ONLY: "${BACKUP_ALLOW_OFFLINE_ONLY:-1}"
      BACKUP_SYNCED_DIR: ${BACKUP_SYNCED_DIR:-}
    volumes:
      - backend-uploads:/app/uploads     # PHI files — MUST persist
      - backend-backups:/app/backups     # DB backup archives

  frontend:
    build: ./Frontend
    restart: unless-stopped
    depends_on:
      # Wait for the backend to pass its HEALTHCHECK (Dockerfile probes
      # /api/health) before nginx starts — otherwise the first requests after
      # `up` 502 until the Node process is actually listening.
      backend:
        condition: service_healthy
    ports:
      # Put a TLS reverse proxy (Caddy/Traefik/nginx) in front of this in prod.
      # BIND_ADDR=127.0.0.1 keeps the plain-HTTP port loopback-only when the
      # TLS proxy runs on the same host (recommended); default 0.0.0.0 suits
      # on-prem LAN installs.
      - "${BIND_ADDR:-0.0.0.0}:${PUBLIC_HTTP_PORT:-8080}:80"

volumes:
  mongo-data:
  backend-uploads:
  backend-backups:
