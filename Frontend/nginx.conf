# Frontend nginx: serve the SPA + reverse-proxy the API to the backend.
# `backend` is the compose service name on the per-hospital Docker network.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Compression ──────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             application/xml text/xml image/svg+xml font/woff2;

  # ── API → backend (keep the /api prefix; backend mounts /api/*) ─
  location /api/ {
    proxy_pass http://backend:5050;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    client_max_body_size 6m;   # backend accepts 5mb JSON — leave a margin
  }

  # ── Uploaded files (PHI) are served by the backend, same origin ─
  location /uploads/ {
    proxy_pass http://backend:5050;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── Hashed assets — cache hard ───────────────────────────────
  # NOTE: add_header in a location cancels inheritance, so the security
  # headers are repeated here on purpose.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  # ── SPA fallback — every other path serves index.html ────────
  # Security headers for the static app (the backend's helmet only covers
  # /api responses). Set per-location — NOT server-wide — so proxied /api
  # responses keep helmet's headers without duplicates.
  location / {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri $uri/ /index.html;
  }
}
